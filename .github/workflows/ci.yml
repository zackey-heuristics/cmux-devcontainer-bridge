name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

      - name: gofumpt (format check)
        run: |
          go install mvdan.cc/gofumpt@v0.7.0
          diff=$(gofumpt -l .)
          if [ -n "$diff" ]; then
            echo "gofumpt would rewrite the following files:"
            echo "$diff"
            echo
            gofumpt -d .
            exit 1
          fi

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: shell e2e smoke
        run: bash scripts/e2e.sh

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: make build
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cmux-notify-bridge-linux-amd64
          path: bin/cmux-notify-bridge
          if-no-files-found: error
          retention-days: 7
